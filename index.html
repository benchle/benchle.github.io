<!DOCTYPE html> 
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchle</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f9fa;
  --white: #ffffff;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --text-secondary: #5f6368;
  --star: #fbbc04;
  --star-empty: #dadce0;
  --blue: #1a73e8;
  --blue-hover: #1557b0;
  --tag-sel-bg: #1a73e8;
  --tag-sel-color: #fff;
  --green: #137333;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
}

body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header { background: var(--white); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
.header-inner { max-width: 900px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.logo-text { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }
.logo-text span { color: var(--blue); }
.btn-write { display: flex; align-items: center; gap: 7px; padding: 9px 18px; background: var(--blue); color: #fff; border: none; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, box-shadow 0.15s; white-space: nowrap; }
.btn-write:hover { background: var(--blue-hover); box-shadow: var(--shadow-md); }

main { max-width: 900px; margin: 0 auto; padding: 24px 20px; }

.hero { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 28px 32px; margin-bottom: 20px; display: flex; align-items: center; gap: 32px; }
.hero-score { text-align: center; flex-shrink: 0; }
.hero-num { font-size: 56px; font-weight: 600; line-height: 1; }
.hero-stars { display: flex; gap: 3px; margin: 6px 0 4px; justify-content: center; }
.hero-count { font-size: 13px; color: var(--text-secondary); }
.hero-divider { width: 1px; height: 80px; background: var(--border); flex-shrink: 0; }
.hero-bars { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 13px; color: var(--text-secondary); width: 16px; text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; height: 8px; background: var(--star-empty); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; background: var(--star); border-radius: 4px; transition: width 0.6s ease; }
.bar-count { font-size: 13px; color: var(--text-secondary); width: 24px; flex-shrink: 0; }

.toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.toolbar-label { font-size: 14px; color: var(--text-secondary); }
.sort-select { padding: 7px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); cursor: pointer; outline: none; }

.review-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 24px; cursor: pointer; transition: box-shadow 0.15s; margin-bottom: 12px; }
.review-card:hover { box-shadow: var(--shadow-md); }
.rc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.rc-meta { flex: 1; min-width: 0; }
.rc-location { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
.rc-stars-row { display: flex; align-items: center; gap: 6px; }
.rc-date { font-size: 12px; color: var(--text-secondary); }
.rc-score { text-align: center; flex-shrink: 0; background: var(--bg); border-radius: 8px; padding: 8px 14px; }
.rc-score-num { font-size: 24px; font-weight: 600; line-height: 1; }
.rc-score-label { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
.rc-sub-stars { display: flex; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
.rc-sub { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }
.rc-sub b { color: var(--star); }
.rc-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.rc-tag { padding: 3px 10px; background: #fce8e6; color: #c5221f; border-radius: 12px; font-size: 12px; font-weight: 500; }
.rc-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

.empty-state { text-align: center; padding: 60px 0; color: var(--text-secondary); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.empty-state p { font-size: 14px; }

.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--white); border-radius: var(--radius); box-shadow: 0 8px 40px rgba(0,0,0,0.2); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s ease; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--white); z-index: 1; }
.modal-header h2 { font-size: 18px; font-weight: 600; }
.modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: background 0.15s; }
.modal-close:hover { background: var(--border); }
.modal-body { padding: 20px 24px 24px; }

.field { margin-bottom: 20px; }
.field label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 7px; text-transform: uppercase; letter-spacing: 0.5px; }
.field input[type="text"], .field textarea { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; background: var(--white); }
.field input[type="text"]:focus, .field textarea:focus { border-color: var(--blue); }
.field textarea { resize: vertical; line-height: 1.6; }

.stars-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.star-group-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.stars { display: flex; gap: 4px; }
.star { font-size: 26px; color: var(--star-empty); cursor: pointer; transition: color 0.1s, transform 0.1s; user-select: none; line-height: 1; }
.star.lit { color: var(--star); }
.star:hover { transform: scale(1.2); }
.star.readonly { cursor: default; }
.star.readonly:hover { transform: none; }

.tags-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
.tag { padding: 6px 13px; border: 1.5px solid var(--border); border-radius: 16px; background: var(--white); color: var(--text-secondary); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.12s; }
.tag:hover { border-color: var(--blue); color: var(--blue); }
.tag.selected { background: var(--tag-sel-bg); color: var(--tag-sel-color); border-color: var(--tag-sel-bg); }

.modal-footer { display: flex; align-items: center; justify-content: space-between; padding-top: 16px; border-top: 1px solid var(--border); margin-top: 4px; flex-wrap: wrap; gap: 10px; }
.anon-note { font-size: 12px; color: var(--text-secondary); }
.btn-submit { padding: 10px 24px; background: var(--blue); color: #fff; border: none; border-radius: 20px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
.btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-submit:not(:disabled):hover { background: var(--blue-hover); }

.success-msg { text-align: center; padding: 40px 0; color: var(--green); }
.success-msg .check { font-size: 48px; margin-bottom: 12px; }
.success-msg p { font-size: 16px; font-weight: 500; }

.detail-loc { font-size: 22px; font-weight: 600; margin-bottom: 12px; line-height: 1.3; }
.detail-score-row { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
.detail-score-big { font-size: 40px; font-weight: 600; line-height: 1; }
.detail-score-right { display: flex; flex-direction: column; gap: 4px; }
.detail-date { font-size: 13px; color: var(--text-secondary); }
.detail-sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.detail-sub-card { background: var(--bg); border-radius: 8px; padding: 12px 16px; }
.detail-sub-card-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.detail-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 20px; }
.detail-tag { padding: 5px 12px; background: #fce8e6; color: #c5221f; border-radius: 12px; font-size: 13px; font-weight: 500; }
.detail-desc { font-size: 15px; line-height: 1.7; color: var(--text); background: var(--bg); border-radius: 8px; padding: 16px; }

.loading { display: flex; align-items: center; justify-content: center; padding: 60px 0; color: var(--text-secondary); gap: 10px; font-size: 15px; }
.spinner { width: 22px; height: 22px; border: 2.5px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.anim { animation: fadeIn 0.25s ease both; }

footer { border-top: 1px solid var(--border); background: var(--white); padding: 24px 20px; margin-top: 48px; }
.footer-inner { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 14px; text-align: center; }
.footer-logo { font-size: 16px; font-weight: 600; color: var(--text); }
.footer-links { display: flex; gap: 24px; flex-wrap: wrap; justify-content: center; }
.footer-links a { font-size: 13px; color: var(--text-secondary); text-decoration: none; transition: color 0.15s; }
.footer-links a:hover { color: var(--blue); }
.footer-copy { font-size: 12px; color: var(--text-secondary); }

@media (max-width: 500px) {
  .hero { flex-direction: column; gap: 16px; }
  .hero-divider { display: none; }
  .stars-grid { grid-template-columns: 1fr 1fr; }
  .detail-sub-grid { grid-template-columns: 1fr; }
  .rc-score { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-text">Bench<span>le</span></div>
    <button class="btn-write" onclick="openWriteModal()">+ Write Review</button>
  </div>
</header>

<main>
  <div class="hero" id="hero" style="display:none">
    <div class="hero-score">
      <div class="hero-num" id="hero-num">—</div>
      <div class="hero-stars" id="hero-stars"></div>
      <div class="hero-count" id="hero-count"></div>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-bars" id="hero-bars"></div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <span class="toolbar-label" id="toolbar-label"></span>
    <select class="sort-select" onchange="sortReviews(this.value)">
      <option value="newest">Newest</option>
      <option value="best">Best</option>
      <option value="worst">Worst</option>
    </select>
  </div>

  <div id="reviews-container">
    <div class="loading"><div class="spinner"></div> Loading Reviews…</div>
  </div>
</main>

<footer> <!-- die scheiße klappt nie -->
  <div class="footer-inner">
    <div class="footer-logo">Benchle</div>
    <nav class="footer-links">
      <a href="about.html">About Us</a>
      <a href="impressum.html">Imprint</a>
      <a href="datenschutz.html">Privacy</a>
      <a href="kontakt.html">Contact</a>
    </nav>
    <div class="footer-copy">© 2026 Benchle · Anonymous · Free · For everyone</div>
  </div>
</footer>

<!-- WRITE MODAL -->
<div class="modal-overlay" id="write-modal" onclick="closeIfOutside(event,'write-modal')">
  <div class="modal">
    <div class="modal-header">
      <h2>Review a bench!</h2>
      <button class="modal-close" onclick="closeWriteModal()">✕</button>
    </div>
    <div class="modal-body"><div id="form-inner"></div></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal" onclick="closeIfOutside(event,'detail-modal')">
  <div class="modal">
    <div class="modal-header">
      <h2>Review</h2>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="detail-content"></div>
  </div>
</div>

<script>
const BIN_ID  = '69d17eef36566621a87ccb6c';
const API_KEY = '$2a$10$ub/q6IbwSoV/mcYt129Aj.IW5K7ye0Wn/wiUhGXppQZtIIh.BXlI2';

const ANNOYANCES = ['Loud','Pigeons','No shade','Trash everywhere','Shakes','Bad view','Worn down','No backrest','Too cramped','Bad lighting','Too sunny','Wet','Drafty'];

let ratings = { location: 0, view: 0, overall: 0 };
let selectedTags = [];
let cachedReviews = null;
let currentSort = 'newest';

async function loadReviews() {
  if (cachedReviews !== null) return cachedReviews;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': API_KEY },
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const rec = data.record;
    cachedReviews = Array.isArray(rec) ? rec
                  : (rec && Array.isArray(rec.reviews)) ? rec.reviews
                  : [];
  } catch(e) {
    console.error('Failed to load:', e);
    cachedReviews = [];
  }
  return cachedReviews;
}

function saveReviews(reviews) {
  cachedReviews = reviews;
  return new Promise((resolve) => {
    const xhr = new XMLHttpRequest();
    xhr.open('PUT', `https://api.jsonbin.io/v3/b/${BIN_ID}`, true);
    xhr.setRequestHeader('X-Master-Key', API_KEY);
    xhr.onload = () => resolve();
    xhr.onerror = () => { console.error('Save failed'); resolve(); };
    xhr.send(new Blob([JSON.stringify({ reviews })], { type: 'application/json' }));
  });
}

function starsHtml(val, size) {
  let h = '';
  for (let i = 1; i <= 5; i++) h += `<span style="font-size:${size||14}px;color:${i<=val?'#fbbc04':'#dadce0'}">★</span>`;
  return h;
}

function renderStarsEl(container, val, key, readonly) {
  container.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const s = document.createElement('span');
    s.className = 'star' + (i <= val ? ' lit' : '') + (readonly ? ' readonly' : '');
    s.textContent = '★';
    if (!readonly) {
      s.addEventListener('mouseenter', () => document.querySelectorAll(`#stars-${key} .star`).forEach((x,j) => x.classList.toggle('lit', j < i)));
      s.addEventListener('mouseleave', () => document.querySelectorAll(`#stars-${key} .star`).forEach((x,j) => x.classList.toggle('lit', j < ratings[key])));
      s.addEventListener('click', () => { ratings[key] = i; document.querySelectorAll(`#stars-${key} .star`).forEach((x,j) => x.classList.toggle('lit', j < i)); validateForm(); });
    }
    container.appendChild(s);
  }
}

function renderTagsEl(wrap) {
  wrap.innerHTML = '';
  ANNOYANCES.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag' + (selectedTags.includes(tag) ? ' selected' : '');
    btn.textContent = tag;
    btn.onclick = () => {
      selectedTags = selectedTags.includes(tag) ? selectedTags.filter(t=>t!==tag) : [...selectedTags, tag];
      renderTagsEl(wrap);
    };
    wrap.appendChild(btn);
  });
}

function validateForm() {
  const btn = document.getElementById('submit-btn');
  if (btn) btn.disabled = !document.getElementById('loc')?.value.trim() || !ratings.overall;
}

function initForm() {
  ratings = { location: 0, view: 0, overall: 0 };
  selectedTags = [];
  document.getElementById('form-inner').innerHTML = `
    <div class="field">
      <label for="loc">Place / Description *</label>
      <input type="text" id="loc" placeholder="e.g. Central Park, near the fountain" oninput="validateForm()" />
    </div>
    <div class="stars-grid">
      <div><div class="star-group-label">Position</div><div class="stars" id="stars-location"></div></div>
      <div><div class="star-group-label">View</div><div class="stars" id="stars-view"></div></div>
      <div><div class="star-group-label">Overall *</div><div class="stars" id="stars-overall"></div></div>
    </div>
    <div class="field">
      <label>Anything annoying?</label>
      <div class="tags-wrap" id="tags-wrap"></div>
    </div>
    <div class="field">
      <label for="desc">Description</label>
      <textarea id="desc" rows="4" placeholder="What makes this bench special?"></textarea>
    </div>
    <div class="modal-footer">
      <span class="anon-note">Anonymous · No account needed</span>
      <button class="btn-submit" id="submit-btn" onclick="submitReview()" disabled>Post</button>
    </div>`;
  renderStarsEl(document.getElementById('stars-location'), 0, 'location', false);
  renderStarsEl(document.getElementById('stars-view'), 0, 'view', false);
  renderStarsEl(document.getElementById('stars-overall'), 0, 'overall', false);
  renderTagsEl(document.getElementById('tags-wrap'));
}

async function submitReview() {
  const loc = document.getElementById('loc').value.trim();
  if (!loc || !ratings.overall) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  const review = {
    id: Date.now(),
    date: new Date().toISOString(),
    location: loc,
    description: document.getElementById('desc').value.trim(),
    starLocation: ratings.location,
    starView: ratings.view,
    starOverall: ratings.overall,
    annoyances: [...selectedTags],
  };
  const reviews = await loadReviews();
  reviews.unshift(review);
  await saveReviews(reviews);
  document.getElementById('form-inner').innerHTML = `<div class="success-msg"><div class="check"></div><p>Review posted!</p></div>`;
  setTimeout(() => { closeWriteModal(); cachedReviews = null; renderList(); }, 1600);
}

function openWriteModal() { initForm(); document.getElementById('write-modal').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeWriteModal() { document.getElementById('write-modal').classList.remove('open'); document.body.style.overflow = ''; }
function closeDetailModal() { document.getElementById('detail-modal').classList.remove('open'); document.body.style.overflow = ''; }
function closeIfOutside(e, id) { if (e.target.id === id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; } }

function sortReviews(val) { currentSort = val; renderList(); }

async function renderList() {
  const container = document.getElementById('reviews-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Loading Reviews…</div>';
  document.getElementById('hero').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';

  let reviews = await loadReviews();
  reviews = [...reviews];
  if (currentSort === 'best') reviews.sort((a,b) => b.starOverall - a.starOverall);
  else if (currentSort === 'worst') reviews.sort((a,b) => a.starOverall - b.starOverall);

  container.innerHTML = '';

  if (reviews.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🪑</div><h3>No reviews yet</h3><p>Be the first to review a bench!</p></div>`;
    return;
  }

  const avg = reviews.reduce((a,r)=>a+r.starOverall,0)/reviews.length;
  const counts = [5,4,3,2,1].map(n => reviews.filter(r=>r.starOverall===n).length);
  document.getElementById('hero-num').textContent = avg.toFixed(1);
  document.getElementById('hero-stars').innerHTML = starsHtml(Math.round(avg), 22);
  document.getElementById('hero-count').textContent = reviews.length + (reviews.length===1?' Review':' Reviews');
  document.getElementById('hero-bars').innerHTML = [5,4,3,2,1].map((n,i) => `
    <div class="bar-row">
      <div class="bar-label">${n}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${reviews.length?counts[i]/reviews.length*100:0}%"></div></div>
      <div class="bar-count">${counts[i]}</div>
    </div>`).join('');
  document.getElementById('hero').style.display = 'flex';
  document.getElementById('toolbar-label').textContent = reviews.length + (reviews.length===1?' Review':' Reviews');
  document.getElementById('toolbar').style.display = 'flex';

  reviews.forEach(r => {
    const card = document.createElement('div');
    card.className = 'review-card anim';
    card.onclick = () => showDetail(r.id);
    const tags = r.annoyances?.length
      ? r.annoyances.slice(0,3).map(t=>`<span class="rc-tag">${esc(t)}</span>`).join('') + (r.annoyances.length>3?`<span class="rc-tag">+${r.annoyances.length-3}</span>`:'')
      : '';
    const subStars = [
      r.starLocation ? `<div class="rc-sub">Position <b>${'★'.repeat(r.starLocation)}</b></div>` : '',
      r.starView     ? `<div class="rc-sub">View <b>${'★'.repeat(r.starView)}</b></div>` : '',
    ].join('');
    card.innerHTML = `
      <div class="rc-top">
        <div class="rc-meta">
          <div class="rc-location">${esc(r.location)}</div>
          <div class="rc-stars-row">
            ${starsHtml(r.starOverall,14)}
            <span class="rc-date">${formatDate(r.date)}</span>
          </div>
        </div>
        <div class="rc-score"><div class="rc-score-num">${r.starOverall}</div><div class="rc-score-label">/ 5</div></div>
      </div>
      ${subStars ? `<div class="rc-sub-stars">${subStars}</div>` : ''}
      ${tags ? `<div class="rc-tags">${tags}</div>` : ''}
      ${r.description ? `<div class="rc-desc">${esc(r.description)}</div>` : ''}`;
    container.appendChild(card);
  });
}

async function showDetail(id) {
  const reviews = await loadReviews();
  const r = reviews.find(x => x.id === id);
  if (!r) return;
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-loc">${esc(r.location)}</div>
    <div class="detail-score-row">
      <div class="detail-score-big">${r.starOverall}</div>
      <div class="detail-score-right">
        <div>${starsHtml(r.starOverall, 20)}</div>
        <div class="detail-date">${formatDate(r.date)}</div>
      </div>
    </div>
    ${(r.starLocation || r.starView) ? `
    <div class="detail-sub-grid">
      ${r.starLocation ? `<div class="detail-sub-card"><div class="detail-sub-card-label">Position</div>${starsHtml(r.starLocation,18)}</div>` : ''}
      ${r.starView ? `<div class="detail-sub-card"><div class="detail-sub-card-label">View</div>${starsHtml(r.starView,18)}</div>` : ''}
    </div>` : ''}
    ${r.annoyances?.length ? `<div class="detail-tags">${r.annoyances.map(t=>`<span class="detail-tag">${esc(t)}</span>`).join('')}</div>` : ''}
    ${r.description ? `<div class="detail-desc">${esc(r.description)}</div>` : ''}`;
  document.getElementById('detail-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(iso) { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}); }

renderList();
</script>
</body>
</html>
