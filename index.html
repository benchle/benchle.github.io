<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benchle</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ❌ CARDS KOMPLETT ENTFERNEN */
.hero,
.review-card,
.modal {
  background: none;
  border: none;
  box-shadow: none;
  border-radius: 0;
}

/* 📱 HAUPTFLÄCHE WIE iOS LIST */
main {
  background: linear-gradient(#f2f6fb, #dce6f2);
  border-top: 1px solid rgba(255,255,255,0.8);
  border-bottom: 1px solid rgba(0,0,0,0.2);
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.15);
  padding: 10px 0;
}

/* 🧾 JEDE REVIEW = LIST ITEM */
.review-card {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(0,0,0,0.15);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
  background: linear-gradient(#fdfefe, #e8f0fa);
}

/* Hover wie iOS Tap */
.review-card:hover {
  background: linear-gradient(#dbe9ff, #c5dbff);
}

/* HERO auch integriert */
.hero {
  padding: 20px;
  border-bottom: 2px solid rgba(0,0,0,0.2);
  background: linear-gradient(#eaf2fb, #d6e6fa);
}

/* TOOLBAR */
.toolbar {
  padding: 10px 20px;
  border-bottom: 1px solid rgba(0,0,0,0.2);
  background: linear-gradient(#e3edf9, #cfe0f5);
}

/* SCORE BOX weniger "card" */
.rc-score {
  background: linear-gradient(#ffffff, #dce9f9);
  border: 1px solid #a8c4e8;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
}

/* TAGS */
.tag {
  background: linear-gradient(#ffffff, #d6e8ff);
  border: 1px solid #9fc2f0;
}

/* MODAL = FULLSCREEN LOOK */
.modal {
  width: 100%;
  max-width: none;
  height: 100%;
  border-radius: 0;
}

/* MODAL HEADER wie iOS Navbar */
.modal-header {
  background: linear-gradient(#6ec3ff, #1a73e8);
  color: white;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.6),
    0 2px 6px rgba(0,0,0,0.3);
}

/* FOOTER bleibt */
footer {
  margin-top: 0;
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-text">Bench<span>le</span></div>
    <button class="btn-write" onclick="openWriteModal()">+ Write Review</button>
  </div>
</header>

<main>
  <div class="hero" id="hero" style="display:none">
    <div class="hero-score">
      <div class="hero-num" id="hero-num">—</div>
      <div class="hero-stars" id="hero-stars"></div>
      <div class="hero-count" id="hero-count"></div>
    </div>
    <div class="hero-divider"></div>
    <div class="hero-bars" id="hero-bars"></div>
  </div>

  <div class="toolbar" id="toolbar" style="display:none">
    <span class="toolbar-label" id="toolbar-label"></span>
    <select class="sort-select" onchange="sortReviews(this.value)">
      <option value="newest">Newest</option>
      <option value="best">Best</option>
      <option value="worst">Worst</option>
    </select>
  </div>

  <div id="reviews-container">
    <div class="loading"><div class="spinner"></div> Loading Reviews…</div>
  </div>
</main>

<footer> <!-- die scheiße klappt nie -->
  <div class="footer-inner">
    <div class="footer-logo">Benchle</div>
    <nav class="footer-links">
      <a href="about.html">About Us</a>
      <a href="impressum.html">Imprint</a>
      <a href="datenschutz.html">Privacy</a>
      <a href="kontakt.html">Contact</a>
    </nav>
    <div class="footer-copy">© 2026 Benchle · Anonymous · Free · For everyone</div>
  </div>
</footer>

<!-- WRITE MODAL -->
<div class="modal-overlay" id="write-modal" onclick="closeIfOutside(event,'write-modal')">
  <div class="modal">
    <div class="modal-header">
      <h2>Review a bench!</h2>
      <button class="modal-close" onclick="closeWriteModal()">✕</button>
    </div>
    <div class="modal-body"><div id="form-inner"></div></div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal" onclick="closeIfOutside(event,'detail-modal')">
  <div class="modal">
    <div class="modal-header">
      <h2>Review</h2>
      <button class="modal-close" onclick="closeDetailModal()">✕</button>
    </div>
    <div class="modal-body" id="detail-content"></div>
  </div>
</div>

<script>
const BIN_ID  = '69d17eef36566621a87ccb6c';
const API_KEY = '$2a$10$ub/q6IbwSoV/mcYt129Aj.IW5K7ye0Wn/wiUhGXppQZtIIh.BXlI2';

const ANNOYANCES = ['Loud','Pigeons','No shade','Trash everywhere','Shakes','Bad view','Worn down','No backrest','Too cramped','Bad lighting','Too sunny','Wet','Drafty'];

let ratings = { location: 0, view: 0, overall: 0 };
let selectedTags = [];
let cachedReviews = null;
let currentSort = 'newest';

async function loadReviews() {
  if (cachedReviews !== null) return cachedReviews;
  try {
    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': API_KEY },
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const rec = data.record;
    cachedReviews = Array.isArray(rec) ? rec
                  : (rec && Array.isArray(rec.reviews)) ? rec.reviews
                  : [];
  } catch(e) {
    console.error('Failed to load:', e);
    cachedReviews = [];
  }
  return cachedReviews;
}

function saveReviews(reviews) {
  cachedReviews = reviews;
  return new Promise((resolve) => {
    const xhr = new XMLHttpRequest();
    xhr.open('PUT', `https://api.jsonbin.io/v3/b/${BIN_ID}`, true);
    xhr.setRequestHeader('X-Master-Key', API_KEY);
    xhr.onload = () => resolve();
    xhr.onerror = () => { console.error('Save failed'); resolve(); };
    xhr.send(new Blob([JSON.stringify({ reviews })], { type: 'application/json' }));
  });
}

function starsHtml(val, size) {
  let h = '';
  for (let i = 1; i <= 5; i++) h += `<span style="font-size:${size||14}px;color:${i<=val?'#fbbc04':'#dadce0'}">★</span>`;
  return h;
}

function renderStarsEl(container, val, key, readonly) {
  container.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const s = document.createElement('span');
    s.className = 'star' + (i <= val ? ' lit' : '') + (readonly ? ' readonly' : '');
    s.textContent = '★';
    if (!readonly) {
      s.addEventListener('mouseenter', () => document.querySelectorAll(`#stars-${key} .star`).forEach((x,j) => x.classList.toggle('lit', j < i)));
      s.addEventListener('mouseleave', () => document.querySelectorAll(`#stars-${key} .star`).forEach((x,j) => x.classList.toggle('lit', j < ratings[key])));
      s.addEventListener('click', () => { ratings[key] = i; document.querySelectorAll(`#stars-${key} .star`).forEach((x,j) => x.classList.toggle('lit', j < i)); validateForm(); });
    }
    container.appendChild(s);
  }
}

function renderTagsEl(wrap) {
  wrap.innerHTML = '';
  ANNOYANCES.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag' + (selectedTags.includes(tag) ? ' selected' : '');
    btn.textContent = tag;
    btn.onclick = () => {
      selectedTags = selectedTags.includes(tag) ? selectedTags.filter(t=>t!==tag) : [...selectedTags, tag];
      renderTagsEl(wrap);
    };
    wrap.appendChild(btn);
  });
}

function validateForm() {
  const btn = document.getElementById('submit-btn');
  if (btn) btn.disabled = !document.getElementById('loc')?.value.trim() || !ratings.overall;
}

function initForm() {
  ratings = { location: 0, view: 0, overall: 0 };
  selectedTags = [];
  document.getElementById('form-inner').innerHTML = `
    <div class="field">
      <label for="loc">Place / Description *</label>
      <input type="text" id="loc" placeholder="e.g. Central Park, near the fountain" oninput="validateForm()" />
    </div>
    <div class="stars-grid">
      <div><div class="star-group-label">Position</div><div class="stars" id="stars-location"></div></div>
      <div><div class="star-group-label">View</div><div class="stars" id="stars-view"></div></div>
      <div><div class="star-group-label">Overall *</div><div class="stars" id="stars-overall"></div></div>
    </div>
    <div class="field">
      <label>Anything annoying?</label>
      <div class="tags-wrap" id="tags-wrap"></div>
    </div>
    <div class="field">
      <label for="desc">Description</label>
      <textarea id="desc" rows="4" placeholder="What makes this bench special?"></textarea>
    </div>
    <div class="modal-footer">
      <span class="anon-note">Anonymous · No account needed</span>
      <button class="btn-submit" id="submit-btn" onclick="submitReview()" disabled>Post</button>
    </div>`;
  renderStarsEl(document.getElementById('stars-location'), 0, 'location', false);
  renderStarsEl(document.getElementById('stars-view'), 0, 'view', false);
  renderStarsEl(document.getElementById('stars-overall'), 0, 'overall', false);
  renderTagsEl(document.getElementById('tags-wrap'));
}

async function submitReview() {
  const loc = document.getElementById('loc').value.trim();
  if (!loc || !ratings.overall) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';
  const review = {
    id: Date.now(),
    date: new Date().toISOString(),
    location: loc,
    description: document.getElementById('desc').value.trim(),
    starLocation: ratings.location,
    starView: ratings.view,
    starOverall: ratings.overall,
    annoyances: [...selectedTags],
  };
  const reviews = await loadReviews();
  reviews.unshift(review);
  await saveReviews(reviews);
  document.getElementById('form-inner').innerHTML = `<div class="success-msg"><div class="check"></div><p>Review posted!</p></div>`;
  setTimeout(() => { closeWriteModal(); cachedReviews = null; renderList(); }, 1600);
}

function openWriteModal() { initForm(); document.getElementById('write-modal').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeWriteModal() { document.getElementById('write-modal').classList.remove('open'); document.body.style.overflow = ''; }
function closeDetailModal() { document.getElementById('detail-modal').classList.remove('open'); document.body.style.overflow = ''; }
function closeIfOutside(e, id) { if (e.target.id === id) { document.getElementById(id).classList.remove('open'); document.body.style.overflow = ''; } }

function sortReviews(val) { currentSort = val; renderList(); }

async function renderList() {
  const container = document.getElementById('reviews-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Loading Reviews…</div>';
  document.getElementById('hero').style.display = 'none';
  document.getElementById('toolbar').style.display = 'none';

  let reviews = await loadReviews();
  reviews = [...reviews];
  if (currentSort === 'best') reviews.sort((a,b) => b.starOverall - a.starOverall);
  else if (currentSort === 'worst') reviews.sort((a,b) => a.starOverall - b.starOverall);

  container.innerHTML = '';

  if (reviews.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">🪑</div><h3>No reviews yet</h3><p>Be the first to review a bench!</p></div>`;
    return;
  }

  const avg = reviews.reduce((a,r)=>a+r.starOverall,0)/reviews.length;
  const counts = [5,4,3,2,1].map(n => reviews.filter(r=>r.starOverall===n).length);
  document.getElementById('hero-num').textContent = avg.toFixed(1);
  document.getElementById('hero-stars').innerHTML = starsHtml(Math.round(avg), 22);
  document.getElementById('hero-count').textContent = reviews.length + (reviews.length===1?' Review':' Reviews');
  document.getElementById('hero-bars').innerHTML = [5,4,3,2,1].map((n,i) => `
    <div class="bar-row">
      <div class="bar-label">${n}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${reviews.length?counts[i]/reviews.length*100:0}%"></div></div>
      <div class="bar-count">${counts[i]}</div>
    </div>`).join('');
  document.getElementById('hero').style.display = 'flex';
  document.getElementById('toolbar-label').textContent = reviews.length + (reviews.length===1?' Review':' Reviews');
  document.getElementById('toolbar').style.display = 'flex';

  reviews.forEach(r => {
    const card = document.createElement('div');
    card.className = 'review-card anim';
    card.onclick = () => showDetail(r.id);
    const tags = r.annoyances?.length
      ? r.annoyances.slice(0,3).map(t=>`<span class="rc-tag">${esc(t)}</span>`).join('') + (r.annoyances.length>3?`<span class="rc-tag">+${r.annoyances.length-3}</span>`:'')
      : '';
    const subStars = [
      r.starLocation ? `<div class="rc-sub">Position <b>${'★'.repeat(r.starLocation)}</b></div>` : '',
      r.starView     ? `<div class="rc-sub">View <b>${'★'.repeat(r.starView)}</b></div>` : '',
    ].join('');
    card.innerHTML = `
      <div class="rc-top">
        <div class="rc-meta">
          <div class="rc-location">${esc(r.location)}</div>
          <div class="rc-stars-row">
            ${starsHtml(r.starOverall,14)}
            <span class="rc-date">${formatDate(r.date)}</span>
          </div>
        </div>
        <div class="rc-score"><div class="rc-score-num">${r.starOverall}</div><div class="rc-score-label">/ 5</div></div>
      </div>
      ${subStars ? `<div class="rc-sub-stars">${subStars}</div>` : ''}
      ${tags ? `<div class="rc-tags">${tags}</div>` : ''}
      ${r.description ? `<div class="rc-desc">${esc(r.description)}</div>` : ''}`;
    container.appendChild(card);
  });
}

async function showDetail(id) {
  const reviews = await loadReviews();
  const r = reviews.find(x => x.id === id);
  if (!r) return;
  document.getElementById('detail-content').innerHTML = `
    <div class="detail-loc">${esc(r.location)}</div>
    <div class="detail-score-row">
      <div class="detail-score-big">${r.starOverall}</div>
      <div class="detail-score-right">
        <div>${starsHtml(r.starOverall, 20)}</div>
        <div class="detail-date">${formatDate(r.date)}</div>
      </div>
    </div>
    ${(r.starLocation || r.starView) ? `
    <div class="detail-sub-grid">
      ${r.starLocation ? `<div class="detail-sub-card"><div class="detail-sub-card-label">Position</div>${starsHtml(r.starLocation,18)}</div>` : ''}
      ${r.starView ? `<div class="detail-sub-card"><div class="detail-sub-card-label">View</div>${starsHtml(r.starView,18)}</div>` : ''}
    </div>` : ''}
    ${r.annoyances?.length ? `<div class="detail-tags">${r.annoyances.map(t=>`<span class="detail-tag">${esc(t)}</span>`).join('')}</div>` : ''}
    ${r.description ? `<div class="detail-desc">${esc(r.description)}</div>` : ''}`;
  document.getElementById('detail-modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function formatDate(iso) { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'}); }

renderList();
</script>
</body>
</html>
